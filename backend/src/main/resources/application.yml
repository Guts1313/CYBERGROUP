spring:
  application:
    name: iam-backend
  security:
    oauth2:
      resourceserver:
        jwt:
          # W2 #14 — Backend as OAuth2 resource server pointing at the cybergroup realm.
          # JWK set URI is auto-derived from the issuer-uri.
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/cybergroup}

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
